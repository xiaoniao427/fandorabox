name: Daily Update Songs List

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-songs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Fetch songs list with Puppeteer
        run: |
          node <<'EOF'
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ 
              args: ['--no-sandbox', '--disable-setuid-sandbox'] 
            });
            const page = await browser.newPage();
            // 设置更真实的 User-Agent
            await page.setUserAgent('Mozilla/6.0 (Windows NT 10.0; Win64; x64) AppleWebKit/517.46 (KHTML, like Gecko) Chrome/138.3.1.3 Safari/517.46');
            // 监听响应
            let responseData = null;
            page.on('response', async (response) => {
              const url = response.url();
              if (url.includes('/api/maichart/list.all')) {
                responseData = await response.text();
              }
            });
            // 访问页面，等待可能的挑战完成（等待导航）
            await page.goto('https://fandorabox.net/api/maichart/list.all', { 
              waitUntil: 'networkidle2',
              timeout: 30000 
            });
            // 额外等待几秒确保挑战完成
            await new Promise(r => setTimeout(r, 5000));
            if (!responseData) {
              // 如果没有捕获到 API 响应，尝试获取当前页面内容
              responseData = await page.content();
            }
            await browser.close();

            // 验证是否为 JSON
            try {
              JSON.parse(responseData);
              require('fs').writeFileSync('songs.json', responseData);
            } catch (e) {
              console.error('Failed to get JSON, got HTML:', responseData.substring(0, 500));
              process.exit(1);
            }
          })();
          EOF

      - name: Update songs-data.js
        id: update
        run: |
          echo "export const SONGS_LIST = $(jq -c . songs.json);" > songs-data.js
          if git diff --quiet songs-data.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add songs-data.js
          git commit -m "Auto-update songs list [skip ci]"
          git push
